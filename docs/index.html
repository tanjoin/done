<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーティンカレンダー連携アプリ - タスク一覧</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="nav-bar">
            <a href="index.html" class="nav-link active">タスク一覧</a>
            <a href="settings.html" class="nav-link">設定・データ管理</a>
        </header>

        <div id="notificationBanner" class="notification-banner" style="display: none;">
            <span>タスクの時間になったらプッシュ通知でお知らせします。</span>
            <button class="btn btn-menu" onclick="requestPermission()">通知を有効にする</button>
        </div>

        <main>
            <div class="filter-controls" style="margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; background: var(--card-bg); padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border-color);">
                <span style="font-size: 13px; font-weight: bold; color: var(--text-secondary); width: 100%; margin-bottom: 4px;">表示フィルター:</span>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); cursor: pointer; user-select: none;">
                    <input type="checkbox" id="hideOutOfTimeCheckbox" style="cursor: pointer; width: 16px; height: 16px;">
                    <span>時間外を非表示</span>
                </label>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); cursor: pointer; user-select: none;">
                    <input type="checkbox" id="hideCompletedCheckbox" style="cursor: pointer; width: 16px; height: 16px;">
                    <span>追加済みを非表示</span>
                </label>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); cursor: pointer; user-select: none;">
                    <input type="checkbox" id="hideCancelledCheckbox" style="cursor: pointer; width: 16px; height: 16px;">
                    <span>キャンセル済を非表示</span>
                </label>
            </div>

            <div id="taskContainer">
                </div>
        </main>

        <footer style="text-align: center; margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-muted);">
            &copy; 2026 ルーティンカレンダー連携アプリ
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
