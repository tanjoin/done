<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーティンカレンダー連携アプリ - タスク一覧</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="nav-bar">
            <a href="index.html" class="nav-link active">タスク一覧</a>
            <a href="settings.html" class="nav-link">設定・データ管理</a>
        </header>

        <div id="notificationBanner" class="notification-banner" style="display: none;">
            <span>タスクの時間になったらプッシュ通知でお知らせします。</span>
            <button class="btn btn-cancel" onclick="requestPermission()">通知を有効にする</button>
        </div>

        <main>
            <div class="filter-wrapper">
                <button id="toggleFilterBtn" class="btn btn-cancel">
                    フィルターを開く ▼
                </button>
                
                <div id="filterControls" class="filter-controls">
                    <label class="filter-chip">
                        <input type="checkbox" id="hideOutOfTimeCheckbox">
                        <span class="chip-text">時間外を非表示</span>
                    </label>
                    <label class="filter-chip">
                        <input type="checkbox" id="hideCompletedCheckbox">
                        <span class="chip-text">追加済みを非表示</span>
                    </label>
                    <label class="filter-chip">
                        <input type="checkbox" id="hideCancelledCheckbox">
                        <span class="chip-text">キャンセル済を非表示</span>
                    </label>
                </div>
            </div>

            <div id="taskContainer">
                </div>
        </main>

        <footer class="app-footer">
            <a href="https://github.com/tanjoin/done" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">GitHub</a>
            &copy; 2026 done by tanjoin
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
