<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONE - タスク一覧</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="nav-bar">
            <a href="index.html" class="nav-link active">タスク一覧</a>
            <a href="temporary.html" class="nav-link">一時的タスク</a>
            <a href="settings.html" class="nav-link">設定・データ管理</a>
        </header>

        <div id="notificationBanner" class="notification-banner" style="display: none;">
            <span>タスクの時間になったらプッシュ通知でお知らせします。</span>
            <button class="btn btn-cancel" onclick="requestPermission()">通知を有効にする</button>
        </div>

        <main>
            <div class="filter-wrapper">
                <div class="view-mode-switch" role="group" aria-label="表示モード切り替え">
                    <span class="view-mode-label">表示モード</span>
                    <label class="switch-pill" for="viewModeToggle">
                        <input type="checkbox" id="viewModeToggle">
                        <span class="switch-track">
                            <span class="switch-text-left">カード</span>
                            <span class="switch-text-right">一覧</span>
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>
                
                <div id="filterControls" class="filter-controls">
                    <div class="filter-button-item">
                        <span class="view-mode-label">該当日外</span>
                        <button id="hideNonTargetDayBtn" type="button" class="filter-toggle-btn" aria-pressed="false">表示</button>
                    </div>
                    <div class="filter-button-item">
                        <span class="view-mode-label">時間外</span>
                        <button id="hideOutOfTimeBtn" type="button" class="filter-toggle-btn" aria-pressed="false">表示</button>
                    </div>
                    <div class="filter-button-item">
                        <span class="view-mode-label">追加済み</span>
                        <button id="hideCompletedBtn" type="button" class="filter-toggle-btn" aria-pressed="false">表示</button>
                    </div>
                    <div class="filter-button-item">
                        <span class="view-mode-label">キャンセル済</span>
                        <button id="hideCancelledBtn" type="button" class="filter-toggle-btn" aria-pressed="false">表示</button>
                    </div>
                </div>
            </div>

            <div id="taskContainer">
                </div>
        </main>

        <footer class="app-footer">
            <a href="https://github.com/tanjoin/done" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">GitHub</a>
            &copy; 2026 done by tanjoin
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
